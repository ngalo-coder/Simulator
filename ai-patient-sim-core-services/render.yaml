# ai-patient-sim-core-services/render.yaml
services:
  - type: web
    name: user-service
    env: node
    buildCommand: cd user-service && npm install
    startCommand: cd user-service && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        value: mongodb+srv://username:password@cluster0.mongodb.net/ai_patient_sim_users
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: ""
      - key: GATEWAY_URL
        value: ""
    healthCheckPath: /health