# ai-patient-sim-core-services/render.yaml
services:
  # User Service
  - type: web
    name: user-service
    env: node
    buildCommand: cd user-service && npm install
    startCommand: cd user-service && npm start
    envVars:
      - key: NODE_ENV
        value: production     
      - key: JWT_SECRET
        generateValue: true

  # Simulation Service  
  - type: web
    name: simulation-service
    env: node
    buildCommand: cd simulation-service && npm install
    startCommand: cd simulation-service && npm start
    envVars:
      - key: NODE_ENV
        value: production      

  # Clinical Service
  - type: web
    name: clinical-service
    env: node  
    buildCommand: cd clinical-service && npm install
    startCommand: cd clinical-service && npm start
    envVars:
      - key: NODE_ENV
        value: production