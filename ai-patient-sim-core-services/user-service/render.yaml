# ai-patient-sim-core-services/render.yaml
services:
  - type: web
    name: user-service
    env: node
    buildCommand: cd user-service && npm install
    startCommand: cd user-service && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true    
      - key: GATEWAY_URL
        value: ""
    healthCheckPath: /health