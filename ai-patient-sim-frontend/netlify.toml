[build]
  publish = "build"
  command = "npm run build"

[build.environment]
  # Point directly to user service for now (bypass gateway)
  REACT_APP_API_GATEWAY_URL = "https://simulator-zpen.onrender.com"
  REACT_APP_ENVIRONMENT = "production"

# Remove the problematic proxy redirect - let the frontend handle API calls directly
# [[redirects]]
#   from = "/api/*"
#   to = "https://ai-patient-sim-gateway.onrender.com"
#   status = 200
#   force = true

# SPA redirect - all routes go to index.html  
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"