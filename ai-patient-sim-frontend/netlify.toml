[build]
  publish = "build"
  command = "npm run build"

[build.environment]
  REACT_APP_API_GATEWAY_URL = "https://simulator-zpen.onrender.com"
  REACT_APP_ENVIRONMENT = "production"

# Direct proxy to user service (no /api/users prefix stripping needed)
[[redirects]]
  from = "/api/users/*"
  to = "https://simulator-zpen.onrender.com/auth/:splat"
  status = 200
  force = true

# Health check proxy
[[redirects]]
  from = "/api/health"
  to = "https://simulator-zpen.onrender.com/health"
  status = 200
  force = true

# SPA redirect - all routes go to index.html  
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"