[build]
  publish = "build"
  command = "npm run build"

[build.environment]
  REACT_APP_API_GATEWAY_URL = "https://simulator-zpen.onrender.com"
  REACT_APP_ENVIRONMENT = "production"

# REMOVE the old redirects that don't match your API calls
# Your frontend now makes direct calls to the backend, no proxying needed

# SPA redirect - all routes go to index.html  
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With"