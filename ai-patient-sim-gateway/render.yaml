services:
  - type: web
    name: api-gateway
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Service URLs (will be empty initially - add as you deploy services)
      - key: USER_SERVICE_URL
        value: ""
      - key: SIMULATION_SERVICE_URL
        value: ""
      - key: CLINICAL_SERVICE_URL
        value: ""
      - key: CASE_SERVICE_URL
        value: ""
      - key: ANALYTICS_SERVICE_URL
        value: ""
      - key: FRONTEND_URL
        value: ""
    healthCheckPath: /health